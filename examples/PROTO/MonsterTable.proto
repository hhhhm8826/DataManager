syntax = "proto3";

package DATA_MANAGER_TABLE;
option go_package = "./DATA_MANAGER_TABLE";
import "RewardItemTable.proto";
import "StringTable.proto";

// 몬스터 테이블

// 몬스터 드롭 아이템 테이블






message MonsterRace {
  // @PK
  int32 GroupID = 1;
  // @PK
  Monster MonsterID = 2;
  // @Memo(memo-84736e5d-0528-466e-b89d-20947c29fc11) Memo

}

message Monster {
  // @PK
  int32 monsterId = 1;
  StringData name = 2;
  int32 hp = 3;
  int32 atk = 4;
  int32 def = 5;
  float moveSpeed = 6;
  RewardItemGroup RewardGroupId = 7;
}
